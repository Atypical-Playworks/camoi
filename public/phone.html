<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>📱 Cámara — iPhone Webcam Bridge</title>
<style>
  html, body { margin: 0; height: 100%; background: #0d1115; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; }
  #localVideo { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  #previewVideo { position: fixed; inset: 0; }
  canvas { display: none; }
  #ui {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    font-family: -apple-system, sans-serif; color: #fff; text-align: center; padding: 24px;
  }
  #ui h2 { font-size: 18px; }
  #ui p { font-size: 14px; opacity: .7; }
  #status {
    position: fixed; top: 12px; left: 0; right: 0; text-align: center;
    font-family: -apple-system, sans-serif; font-size: 13px;
    color: #fff; background: rgba(0,0,0,.5); padding: 6px 12px;
    border-radius: 8px; margin: 0 auto; width: fit-content;
    pointer-events: none; z-index: 10;
  }
  button {
    font-size: 16px; padding: 14px 28px; border-radius: 14px; border: none;
    background: #2f81f7; color: #fff; font-weight: 600; cursor: pointer;
  }
  button:active { transform: scale(.96); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.on { background: #3fb950; }
  .dot.off { background: #f85149; }
  #phoneControls {
    position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 10;
    display: none; gap: 8px; flex-wrap: wrap; padding: 10px;
    background: rgba(0, 0, 0, .72); border-radius: 12px;
    font-family: -apple-system, sans-serif;
    color: #fff;
  }
  #phoneControls select, #phoneControls button {
    flex: 1 1 140px; min-width: 0; padding: 9px 10px; border-radius: 8px;
    border: 1px solid #444; background: #161b22; color: #fff; font-size: 13px;
  }
  #phoneControls button { cursor: pointer; }
  #phoneControls button.on { background: #238636; }
</style>
</head>
<body>
  <video id="localVideo" autoplay playsinline muted></video>
  <video id="previewVideo" autoplay playsinline muted></video>
  <canvas id="rotateCanvas"></canvas>

  <div id="ui">
    <h2>📱 iPhone Webcam Bridge</h2>
    <p id="hint">Toca para iniciar la cámara</p>
    <button id="startBtn">Iniciar cámara</button>
  </div>

  <div id="status"><span class="dot off" id="dot"></span><span id="statusText">Desconectado</span></div>

  <div id="phoneControls">
    <select id="phoneCameraSelect"><option value="">Cámara</option></select>
    <select id="phoneQualitySelect">
      <option value="1280x720@30">720p 30fps</option>
      <option value="1280x720@60">720p 60fps</option>
      <option value="1920x1080@30" selected>1080p 30fps</option>
      <option value="1920x1080@60">1080p 60fps</option>
      <option value="3840x2160@30">4K 30fps</option>
      <option value="3840x2160@60">4K 60fps</option>
    </select>
    <select id="phoneRotateSelect">
      <option value="0">Rotación 0°</option>
      <option value="90">Rotación 90°</option>
      <option value="180">Rotación 180°</option>
      <option value="270">Rotación 270°</option>
    </select>
    <button id="phoneMirrorBtn">Espejo: OFF</button>
    <label style="flex:1 1 180px;display:flex;align-items:center;gap:8px;font-size:13px">
      Blur <input id="phoneBlurRange" type="range" min="0" max="80" value="0" style="flex:1" />
      <span id="phoneBlurValue">OFF</span>
    </label>
    <span id="blurStatus" style="flex:1 1 100%;font-size:12px;opacity:.8">Blur desactivado</span>
  </div>

<script>
  const localVideo = document.getElementById('localVideo');
  const previewVideo = document.getElementById('previewVideo');
  const rotateCanvas = document.getElementById('rotateCanvas');
  const uiEl = document.getElementById('ui');
  const statusText = document.getElementById('statusText');
  const dot = document.getElementById('dot');
  const startBtn = document.getElementById('startBtn');
  const hintEl = document.getElementById('hint');
  const phoneControls = document.getElementById('phoneControls');
  const phoneCameraSelect = document.getElementById('phoneCameraSelect');
  const phoneQualitySelect = document.getElementById('phoneQualitySelect');
  const phoneRotateSelect = document.getElementById('phoneRotateSelect');
  const phoneMirrorBtn = document.getElementById('phoneMirrorBtn');
  const phoneBlurRange = document.getElementById('phoneBlurRange');
  const phoneBlurValue = document.getElementById('phoneBlurValue');
  const blurStatus = document.getElementById('blurStatus');

  let pc = null;
  let ws = null;
  let localStream = null;
  let canvasStream = null;
  let videoSender = null;
  let currentDeviceId = '';
  let currentRotation = 0;
  let isMirrored = false;
  let blurAmount = 0;
  let animFrameId = null;
  let allCameras = [];
  let canvasCtx = null;
  let videoWidth = 1920;
  let videoHeight = 1080;
  let personCanvas = null;
  let personCtx = null;
  let backgroundCanvas = null;
  let backgroundCtx = null;
  let supportsCanvasFilter = false;
  let segmentationInput = null;
  let selfieSegmentation = null;
  let latestMask = null;
  let segmentationBusy = false;
  let segmentationTimer = null;

  const DEFAULT_QUALITY = '1920x1080@30';
  const SEGMENTATION_WIDTH = 256;
  const SEGMENTATION_HEIGHT = 144;
  const SEGMENTATION_INTERVAL = 33;

  function setStatus(text, connected) {
    statusText.textContent = text;
    dot.className = `dot ${connected ? 'on' : 'off'}`;
  }

  function parseQuality(q) {
    const [size, fps] = q.split('@');
    const [w, h] = size.split('x').map(Number);
    return { width: w, height: h, frameRate: Number(fps) };
  }

  function updatePreviewTransform() {
    localVideo.style.transform = isMirrored ? 'scaleX(-1)' : '';
  }

  async function enumerateCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      allCameras = devices.filter((d) => d.kind === 'videoinput');
      sendCameraList();
    } catch (e) {
      console.warn('enumerateDevices failed:', e);
    }
  }

  function sendCameraList() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({
      type: 'cameras',
      cameras: allCameras.map((c) => ({ deviceId: c.deviceId, label: c.label })),
    }));
    phoneCameraSelect.innerHTML = '';
    allCameras.forEach((camera) => {
      const option = document.createElement('option');
      option.value = camera.deviceId;
      option.textContent = camera.label || 'Cámara';
      phoneCameraSelect.appendChild(option);
    });
  }

  function sendState() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({
      type: 'state',
      rotation: currentRotation,
      mirror: isMirrored,
      blur: blurAmount,
    }));
  }

  async function getStream(deviceId, quality) {
    if (localStream) localStream.getTracks().forEach((t) => t.stop());
    const q = parseQuality(quality || DEFAULT_QUALITY);
    const videoConstraints = {
      width: { ideal: q.width },
      height: { ideal: q.height },
      frameRate: { ideal: q.frameRate },
    };
    if (deviceId) videoConstraints.deviceId = { exact: deviceId };
    localStream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio: true,
    });
    localVideo.srcObject = localStream;
    if (localVideo.readyState < HTMLMediaElement.HAVE_METADATA) {
      await new Promise((resolve) => {
        localVideo.addEventListener('loadedmetadata', resolve, { once: true });
      });
    }
    await localVideo.play();
    updatePreviewTransform();
    videoWidth = localVideo.videoWidth || 1920;
    videoHeight = localVideo.videoHeight || 1080;
    await enumerateCameras();
    setupCanvas();
    return localStream;
  }

  async function ensureSegmentation() {
    if (selfieSegmentation) return;

    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js';
    script.crossOrigin = 'anonymous';
    document.head.appendChild(script);
    await new Promise((resolve, reject) => {
      script.onload = resolve;
      script.onerror = reject;
    });

    selfieSegmentation = new window.SelfieSegmentation({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`,
    });
    selfieSegmentation.setOptions({ modelSelection: 1 });
    selfieSegmentation.onResults((results) => {
      latestMask = results.segmentationMask;
      blurStatus.textContent = 'Máscara activa: sujeto detectado';
    });

    segmentationInput = document.createElement('canvas');
    segmentationInput.width = SEGMENTATION_WIDTH;
    segmentationInput.height = SEGMENTATION_HEIGHT;
    personCanvas = document.createElement('canvas');
    personCanvas.width = videoWidth;
    personCanvas.height = videoHeight;
    personCtx = personCanvas.getContext('2d');
    backgroundCanvas = document.createElement('canvas');
    backgroundCtx = backgroundCanvas.getContext('2d');
    supportsCanvasFilter = 'filter' in backgroundCtx;
  }

  function startSegmentation() {
    if (segmentationTimer || !selfieSegmentation) return;

    const processFrame = async () => {
      segmentationTimer = null;
      if (blurAmount <= 0 || segmentationBusy) return;

      segmentationBusy = true;
      const inputCtx = segmentationInput.getContext('2d');
      inputCtx.drawImage(localVideo, 0, 0, SEGMENTATION_WIDTH, SEGMENTATION_HEIGHT);
      try {
        await selfieSegmentation.send({ image: segmentationInput });
      } catch (error) {
        console.warn('Segmentation failed:', error);
        blurStatus.textContent = 'Error procesando segmentación';
      } finally {
        segmentationBusy = false;
        if (blurAmount > 0) segmentationTimer = setTimeout(processFrame, SEGMENTATION_INTERVAL);
      }
    };

    processFrame();
  }

  function stopSegmentation() {
    if (segmentationTimer) clearTimeout(segmentationTimer);
    segmentationTimer = null;
    blurStatus.textContent = 'Blur desactivado';
  }

  function setupCanvas() {
    if (!canvasCtx) canvasCtx = rotateCanvas.getContext('2d');

    if (animFrameId) cancelAnimationFrame(animFrameId);

    function drawFrame() {
      const isSideways = currentRotation === 90 || currentRotation === 270;
      const canvasW = isSideways ? videoHeight : videoWidth;
      const canvasH = isSideways ? videoWidth : videoHeight;

      if (rotateCanvas.width !== canvasW || rotateCanvas.height !== canvasH) {
        rotateCanvas.width = canvasW;
        rotateCanvas.height = canvasH;
      }

      canvasCtx.clearRect(0, 0, canvasW, canvasH);
      if (blurAmount > 0) {
        const blurFactor = supportsCanvasFilter ? 2 : Math.max(2, Math.round(2 + blurAmount / 2));
        const backgroundW = Math.max(1, Math.round(canvasW / blurFactor));
        const backgroundH = Math.max(1, Math.round(canvasH / blurFactor));
        if (backgroundCanvas.width !== backgroundW || backgroundCanvas.height !== backgroundH) {
          backgroundCanvas.width = backgroundW;
          backgroundCanvas.height = backgroundH;
        }
        backgroundCtx.clearRect(0, 0, backgroundW, backgroundH);
        backgroundCtx.imageSmoothingEnabled = true;
        backgroundCtx.imageSmoothingQuality = 'high';
        backgroundCtx.save();
        backgroundCtx.translate(backgroundW / 2, backgroundH / 2);
        backgroundCtx.rotate((currentRotation * Math.PI) / 180);
        if (isMirrored) backgroundCtx.scale(-1, 1);
        backgroundCtx.filter = supportsCanvasFilter
          ? `blur(${Math.max(1, blurAmount / 2)}px)`
          : 'none';
        backgroundCtx.drawImage(
          localVideo,
          -videoWidth / (blurFactor * 2),
          -videoHeight / (blurFactor * 2),
          videoWidth / blurFactor,
          videoHeight / blurFactor,
        );
        backgroundCtx.restore();
        backgroundCtx.filter = 'none';
        canvasCtx.imageSmoothingEnabled = true;
        canvasCtx.drawImage(backgroundCanvas, 0, 0, canvasW, canvasH);
      } else {
        canvasCtx.save();
        canvasCtx.translate(canvasW / 2, canvasH / 2);
        canvasCtx.rotate((currentRotation * Math.PI) / 180);
        if (isMirrored) canvasCtx.scale(-1, 1);
        canvasCtx.drawImage(localVideo, -videoWidth / 2, -videoHeight / 2, videoWidth, videoHeight);
        canvasCtx.restore();
      }

      if (blurAmount > 0 && latestMask && personCtx) {
        if (personCanvas.width !== canvasW || personCanvas.height !== canvasH) {
          personCanvas.width = canvasW;
          personCanvas.height = canvasH;
        }
        personCtx.clearRect(0, 0, canvasW, canvasH);
        personCtx.save();
        personCtx.translate(canvasW / 2, canvasH / 2);
        personCtx.rotate((currentRotation * Math.PI) / 180);
        if (isMirrored) personCtx.scale(-1, 1);
        personCtx.drawImage(localVideo, -videoWidth / 2, -videoHeight / 2, videoWidth, videoHeight);
        personCtx.globalCompositeOperation = 'destination-in';
        personCtx.drawImage(latestMask, -videoWidth / 2, -videoHeight / 2, videoWidth, videoHeight);
        personCtx.globalCompositeOperation = 'source-over';
        personCtx.restore();
        canvasCtx.drawImage(personCanvas, 0, 0, canvasW, canvasH);
      }
      animFrameId = requestAnimationFrame(drawFrame);
    }
    drawFrame();

    if (!canvasStream) {
      canvasStream = rotateCanvas.captureStream(30);
      const audioTracks = localStream.getAudioTracks();
      if (audioTracks.length > 0) canvasStream.addTrack(audioTracks[0]);
    }
    previewVideo.srcObject = canvasStream;
  }

  function getActiveStream() {
    const needsProcessing = currentRotation !== 0 || isMirrored || blurAmount > 0;
    return canvasStream || localStream;
  }

  function connectSignaling() {
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${wsProto}://${location.host}?role=phone`);

    ws.onopen = () => {
      setStatus('Conectado al servidor', true);
      sendCameraList();
    };
    ws.onclose = () => setStatus('Desconectado', false);
    ws.onerror = () => setStatus('Error de conexión', false);

    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'answer') {
        await pc.setRemoteDescription(new RTCSessionDescription(msg.payload));
        setStatus('Transmitiendo a la PC', true);
        uiEl.style.display = 'none';
        phoneControls.style.display = 'flex';
      } else if (msg.type === 'candidate') {
        try { await pc.addIceCandidate(msg.payload); } catch (e) { console.warn(e); }
      } else if (msg.type === 'viewer-ready') {
        if (localStream) await startCall();
      } else if (msg.type === 'control') {
        await handleControl(msg);
      } else if (msg.type === 'request-cameras') {
        sendCameraList();
      } else if (msg.type === 'request-state') {
        sendState();
      }
    };
  }

  async function handleControl(msg) {
    switch (msg.action) {
      case 'switch-camera':
        currentDeviceId = msg.deviceId;
        await getStream(currentDeviceId, DEFAULT_QUALITY);
        await replaceTrack();
        break;
      case 'change-quality':
        await getStream(currentDeviceId, msg.quality);
        await replaceTrack();
        break;
      case 'rotate':
        currentRotation = msg.rotation;
        phoneRotateSelect.value = String(currentRotation);
        break;
      case 'mirror':
        isMirrored = msg.enabled;
        updatePreviewTransform();
        phoneMirrorBtn.textContent = `Espejo: ${isMirrored ? 'ON' : 'OFF'}`;
        phoneMirrorBtn.className = isMirrored ? 'on' : '';
        break;
      case 'blur':
        blurAmount = msg.amount || 0;
        phoneBlurRange.value = String(blurAmount);
        phoneBlurValue.textContent = blurAmount ? `${blurAmount}px` : 'OFF';
        if (blurAmount > 0) {
          blurStatus.textContent = 'Cargando segmentación...';
          try {
            await ensureSegmentation();
            startSegmentation();
          } catch (error) {
            console.warn('Could not load segmentation:', error);
            blurAmount = 0;
            phoneBlurRange.value = '0';
            phoneBlurValue.textContent = 'OFF';
            const reason = error && error.message ? error.message.slice(0, 100) : 'error desconocido';
            blurStatus.textContent = `Error MediaPipe: ${reason}`;
            setStatus('Blur no disponible: no cargó MediaPipe', false);
          }
        } else {
          stopSegmentation();
          blurStatus.textContent = 'Blur desactivado';
        }
        await replaceTrack();
        break;
    }
  }

  async function replaceTrack() {
    if (!pc || !videoSender) return;
    const stream = getActiveStream();
    const newVideoTrack = stream.getVideoTracks()[0];
    try {
      await videoSender.replaceTrack(newVideoTrack);
    } catch (e) {
      console.warn('replaceTrack failed:', e);
    }
  }

  async function startCall() {
    if (pc) pc.close();
    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
    });

    const stream = getActiveStream();
    stream.getTracks().forEach((track) => {
      const sender = pc.addTrack(track, stream);
      if (track.kind === 'video') videoSender = sender;
    });

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        ws.send(JSON.stringify({ type: 'candidate', payload: event.candidate }));
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', payload: offer }));
    setStatus('Llamando a la PC…', true);
  }

  startBtn.addEventListener('click', async () => {
    try {
      await getStream(currentDeviceId, DEFAULT_QUALITY);
      connectSignaling();
      hintEl.textContent = 'Esperando conexión de la PC…';
      startBtn.style.display = 'none';
      setStatus('Conectando…', true);
      const trySend = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          clearInterval(trySend);
          startCall();
        }
      }, 200);
    } catch (err) {
      console.error('Camera error:', err);
      hintEl.textContent = '❌ No se pudo acceder a la cámara: ' + err.message;
    }
  });

  phoneCameraSelect.addEventListener('change', () => {
    handleControl({ action: 'switch-camera', deviceId: phoneCameraSelect.value });
  });

  phoneQualitySelect.addEventListener('change', () => {
    handleControl({ action: 'change-quality', quality: phoneQualitySelect.value });
  });

  phoneRotateSelect.addEventListener('change', () => {
    handleControl({ action: 'rotate', rotation: Number(phoneRotateSelect.value) });
  });

  phoneMirrorBtn.addEventListener('click', () => {
    handleControl({ action: 'mirror', enabled: !isMirrored });
  });

  phoneBlurRange.addEventListener('input', () => {
    const amount = Number(phoneBlurRange.value);
    phoneBlurValue.textContent = amount ? `${amount}px` : 'OFF';
    clearTimeout(phoneBlurRange.blurTimer);
    phoneBlurRange.blurTimer = setTimeout(() => handleControl({ action: 'blur', amount }), 120);
  });
</script>
</body>
</html>
