<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>🖥️ Visor — iPhone Webcam Bridge</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; }
  #badge {
    position: fixed; top: 12px; left: 12px; padding: 6px 12px; border-radius: 8px;
    background: rgba(0,0,0,.6); color: #fff; font-family: sans-serif; font-size: 13px; z-index: 5;
  }
  #hint {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: sans-serif; text-align: center; padding: 24px;
  }
</style>
</head>
<body>
  <div id="badge">Esperando al iPhone…</div>
  <div id="hint">
    <div>
      <h2>🖥️ Visor de la cámara</h2>
      <p>Abre <b>phone.html</b> en tu iPhone y toca "Iniciar cámara".</p>
      <p style="opacity:.7;font-size:13px">Luego agrega esta pestaña como "Browser Source" en OBS<br/>y activa OBS Virtual Camera.</p>
    </div>
  </div>
  <video id="remoteVideo" autoplay playsinline></video>

<script>
  const badge = document.getElementById('badge');
  const hint = document.getElementById('hint');
  const remoteVideo = document.getElementById('remoteVideo');

  const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${wsProto}://${location.host}?role=viewer`);

  let pc = null;

  function createPeerConnection() {
    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
    });

    pc.ontrack = (event) => {
      remoteVideo.srcObject = event.streams[0];
      badge.textContent = '✅ Recibiendo video del iPhone';
      hint.style.display = 'none';
    };

    pc.onicecandidate = (event) => {
      if (event.candidate) {
        ws.send(JSON.stringify({ type: 'candidate', payload: event.candidate }));
      }
    };

    pc.onconnectionstatechange = () => {
      if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
        badge.textContent = 'Desconectado. Vuelve a iniciar desde el iPhone.';
        hint.style.display = 'flex';
      }
    };
  }

  ws.onopen = () => {
    badge.textContent = 'Conectado. Esperando al iPhone…';
    ws.send(JSON.stringify({ type: 'viewer-ready' }));
  };
  ws.onerror = () => { badge.textContent = 'Error de conexión con el servidor.'; };

  ws.onmessage = async (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'offer') {
      createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(msg.payload));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: 'answer', payload: answer }));
    } else if (msg.type === 'candidate') {
      try { await pc.addIceCandidate(msg.payload); } catch (e) { console.warn(e); }
    }
  };
</script>
</body>
</html>
